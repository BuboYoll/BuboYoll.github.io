<footer class="site-footer">
  <div class="wrapper">
    <div class="footer-content">
      <div class="footer-col">
        <h2 class="footer-heading">{{ site.title }}</h2>
        <p>一个极简风格的个人网站</p>
      </div>
      
      <div class="footer-col">
        <h2 class="footer-heading">导航</h2>
        <ul class="footer-links">
          <li><a href="{{ '/' | relative_url }}">首页</a></li>
          <li><a href="{{ '/about' | relative_url }}">关于我</a></li>
        </ul>
      </div>
      
      <div class="footer-col">
        <h2 class="footer-heading">联系方式</h2>
        <ul class="footer-links">
          {% if site.social_links.github %}
            <li><a href="https://github.com/{{ site.social_links.github }}" target="_blank">GitHub</a></li>
          {% else %}
            <li><a href="https://github.com/BuboYoll" target="_blank">GitHub</a></li>
          {% endif %}
          <li><a href="mailto:example@example.com">邮箱</a></li>
        </ul>
      </div>
    </div>
    
    <div class="footer-bottom">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title | default: "冯菁源的个人网站" }}. 保留所有权利。</p>
    </div>
  </div>
</footer>

<style>
  .site-footer {
    padding: 40px 0 20px;
    background-color: #fafafa;
    border-top: 1px solid #eee;
    font-family: 'Charter', 'Bitstream Charter', 'Sitka Text', Cambria, serif;
  }
  
  .footer-content {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    margin-bottom: 30px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  
  .footer-col {
    flex: 1;
    min-width: 200px;
    margin-bottom: 20px;
    padding-right: 20px;
  }
  
  .footer-heading {
    font-size: 1.2em;
    margin-bottom: 15px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  
  .footer-links {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  
  .footer-links li {
    margin-bottom: 10px;
  }
  
  .footer-links a {
    color: rgba(0, 0, 0, 0.84);
    text-decoration: none;
    position: relative;
    font-size: 16px;
  }
  
  .footer-links a:after {
    content: '';
    position: absolute;
    width: 0;
    height: 1px;
    bottom: 0;
    left: 0;
    background-color: rgba(0, 0, 0, 0.84);
    transition: width 0.3s ease;
  }
  
  .footer-links a:hover:after {
    width: 100%;
  }
  
  .footer-bottom {
    padding-top: 20px;
    border-top: 1px solid #eee;
    text-align: center;
    font-size: 0.9em;
    color: rgba(0, 0, 0, 0.54);
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
  }
  
  @media screen and (max-width: 768px) {
    .footer-content {
      flex-direction: column;
      padding: 0 20px;
    }
    
    .footer-col {
      padding-right: 0;
    }
    
    .site-footer {
      padding: 30px 0 15px;
    }
  }
</style>
